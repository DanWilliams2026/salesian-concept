backend:
  name: github
  repo: DanWilliams2026/salesian-concept
  branch: master
  auth_type: pkce
  app_id: Ov23li4pIovpC3rhHqUu

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "news"
    label: "News Articles"
    label_singular: "Article"
    files:
      - label: "All Articles"
        name: "articles"
        file: "content/news.json"
        fields:
          - label: "Articles"
            name: "articles"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
                hint: "The headline for this article"
              - label: "Date"
                name: "date"
                widget: "datetime"
                date_format: "YYYY-MM-DD"
                time_format: false
                hint: "When was this published?"
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - "School Life"
                  - "Academic"
                  - "Sport"
                  - "Admissions"
                  - "Sixth Form"
                  - "Community"
                  - "Faith"
              - label: "Summary"
                name: "summary"
                widget: "text"
                hint: "Short description shown on the news card (2-3 sentences)"
              - label: "Cover Photo"
                name: "image"
                widget: "image"
                required: false
                hint: "Upload a photo or paste an image URL"
              - label: "Feature this article"
                name: "featured"
                widget: "boolean"
                default: false
                hint: "Tick to show this as the large featured story at the top"
              - label: "Full article body"
                name: "body"
                widget: "markdown"
                required: false
                hint: "Optional — write the full article here"
