backend:
  name: github
  repo: DanWilliams2026/salesian-concept
  branch: master
  base_url: https://salesian-oauth.dan-williams.workers.dev

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "news"
    label: "News Articles"
    label_singular: "Article"
    files:
      - label: "All Articles"
        name: "articles"
        file: "content/news.json"
        fields:
          - label: "Articles"
            name: "articles"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Date"
                name: "date"
                widget: "datetime"
                date_format: "YYYY-MM-DD"
                time_format: false
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - "School Life"
                  - "Academic"
                  - "Sport"
                  - "Admissions"
                  - "Sixth Form"
                  - "Community"
                  - "Faith"
              - label: "Summary"
                name: "summary"
                widget: "text"
              - label: "Cover Photo"
                name: "image"
                widget: "image"
                required: false
              - label: "Feature this article"
                name: "featured"
                widget: "boolean"
                default: false
              - label: "Full article body"
                name: "body"
                widget: "markdown"
                required: false
